version: "3.8"

services:
  redis:
    image: redis:7.0-alpine
    container_name: openmarket-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - openmarket-server

volumes:
  redis-data:

networks:
  openmarket-server:
    driver: bridge
